version: '3.9'

services:
  # PostgreSQL database container
  db:
    image: postgres:15                  # Use PostgreSQL 15 image
    restart: always                     # Restart if container crashes
    env_file:
      - .env                            # Load DB vars from .env.prod (copied jako .env)
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persistent storage for DB
      - ./db-backups:/backups                   # Backup destination (mounted to host)

  # Node.js backend app container
  backend:
    build: ./backend/app                # Build Dockerfile from backend/app/
    env_file:
      - .env.prod                            # Use environment variables from .env
    depends_on:
      - db                              # Start DB first
    volumes:
      - ./backend/app:/usr/src/app      # Mount code into container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: npm start                  # Start backend normally

  # NGINX reverse proxy container
  nginx:
    image: nginx:stable                 # Stable version of nginx
    ports:
      - '80:80'                         # HTTP
      - '443:443'                       # HTTPS (if SSL certs are added)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro  # Custom nginx config
    depends_on:
      - backend                         # Make sure backend is ready first

volumes:
  postgres_data:                        # Docker volume for PostgreSQL data
