version: '3.9' # Docker Compose file version

services:
  db:
    image: postgres:15 # Use the latest stable PostgreSQL image
    restart: always # Restart container if it crashes
    env_file: # Environment variables for backend connection to DB
      - .env.local
    ports:
      - '5433:5432' # ⚠️ Local PostgreSQL is already running on port 5432 (on the host machine/laptop).
                    # This container's PostgreSQL must be exposed on a different port to avoid conflicts.
                    # So we map host port 5433 → to container's internal PostgreSQL port 5432.
                    # Use 'localhost:5433' in pgAdmin/DBeaver to connect to this Dockerized database.
                    # Do NOT change the container's internal port — PostgreSQL always listens on 5432 inside.
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistent volume for DB data
      - ./db-backups:/backups # Folder to store database backups

  backend:
    build: .   # Build from current directory (Dockerfile)
    ports:
      - '3000:3000' # Expose backend port
    environment:
      - NODE_ENV=development    
    env_file: # Environment variables for backend connection to DB
      - .env.local
    depends_on:
      - db # Wait for the db service before starting
    volumes:
      - ./app:/usr/src/app # Mount local folder into container (useful in dev)
      - /usr/src/app/node_modules
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: npm run dev # Start backend using nodemon

volumes:
  postgres_data: # Declare named volume for PostgreSQL data
  

