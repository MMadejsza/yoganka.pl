version: '3.9' # Docker Compose file version

services:
  db:
    image: postgres:15 # Use the latest stable PostgreSQL image
    restart: always # Restart container if it crashes
    environment:
      POSTGRES_DB: yoganka # Database name
      POSTGRES_USER: postgres # Default user
      POSTGRES_PASSWORD: admin1 # Default password
    ports:
      - '5432:5432' # Map local port 5432 to container's port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistent volume for DB data
      - ./db-backups:/backups # Folder to store database backups

  backend:
    build: . # Build from current directory (Dockerfile)
    ports:
      - '3000:3000' # Expose backend port
    environment: # Environment variables for backend connection to DB
      DB_NAME: yoganka
      DB_USER: postgres
      DB_PASS: admin1
      DB_DIALECT: postgres
      DB_HOST: db # Hostname of the DB container
      DB_PORT: 5432
      SESSION_SECRET: my secret
    depends_on:
      - db # Wait for the db service before starting
    volumes:
      - .:/usr/src/app # Mount local folder into container (useful in dev)
    command: npm start # Start backend using npm

volumes:
  postgres_data: # Declare named volume for PostgreSQL data
